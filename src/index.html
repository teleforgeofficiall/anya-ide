<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file: 'unsafe-inline' 'unsafe-eval'; script-src 'self' file: 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' file: 'unsafe-inline'; font-src 'self' data: file:; img-src 'self' data: blob: file:;">
  <title>Anya IDE</title>
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/settings.css">
</head>
<body>
  <div id="app">
    <div id="titlebar"></div>
    <div id="main-content">
      <div id="sidebar">
        <div id="sidebar-tabs">
          <button class="sidebar-tab active" data-tab="files" title="Files">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          </button>
          <button class="sidebar-tab" data-tab="search" title="Search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          </button>
          <button class="sidebar-tab" data-tab="git" title="Source Control">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>
          </button>
          <button class="sidebar-tab" data-tab="ai" title="AI Panel">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.813 15.904l-6.62-3.51a.72.72 0 010-1.265l8.62-4.67a.72.72 0 01.69 0l8.62 4.67a.72.72 0 010 1.265l-6.62 3.51M9.813 15.904l-6.62-3.51a.72.72 0 010-1.265l8.62-4.67a.72.72 0 01.69 0l8.62 4.67a.72.72 0 010 1.265l-6.62 3.51M9.813 15.904l-6.62-3.51a.72.72 0 010-1.265l8.62-4.67a.72.72 0 01.69 0l8.62 4.67a.72.72 0 010 1.265l-6.62 3.51M9.813 15.904l-6.62-3.51a.72.72 0 010-1.265l8.62-4.67a.72.72 0 01.69 0l8.62 4.67a.72.72 0 010 1.265l-6.62 3.51"/></svg>
          </button>
        </div>
        <div id="sidebar-content">
          <div id="sidebar-files" class="sidebar-panel active"></div>
          <div id="sidebar-search" class="sidebar-panel"></div>
          <div id="sidebar-git" class="sidebar-panel"></div>
          <div id="sidebar-ai" class="sidebar-panel"></div>
        </div>

      </div>
      <div id="editor-area">
        <div id="editor-tabs"></div>
        <div id="editor-container"></div>
      </div>
      <div id="chat-panel">
        <div id="chat-header">
          <div id="chat-header-left">
            <select id="chat-model-select" title="Select model"></select>
            <button id="chat-new-session" title="New Chat">✚</button>
          </div>
          <div id="chat-header-right">
            <button id="chat-clear" title="Clear Conversation">🗑️</button>
            <button id="chat-export" title="Export Chat">📋</button>
            <button id="chat-sessions-btn" title="Chat History">📜</button>
            <button id="chat-close" title="Close">✕</button>
          </div>
        </div>
        <div id="chat-sessions-panel" class="hidden"></div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
          <textarea id="chat-input" placeholder="Ask AI anything... (Enter to send, Shift+Enter for new line)" rows="2"></textarea>
          <button id="chat-send">Send</button>
        </div>
      </div>
    </div>
    <div id="terminal-panel" class="hidden">
      <div id="terminal-tabs">
        <span class="terminal-tab active">Terminal 1</span>
        <button id="terminal-new" title="New Terminal">+</button>
        <span id="terminal-close" title="Close">✕</span>
      </div>
      <div id="terminal-container"></div>
    </div>
    <div id="statusbar"></div>
  </div>

  <div id="command-palette-overlay" class="hidden">
    <div id="command-palette">
      <input id="command-input" type="text" placeholder="Type a command...">
      <div id="command-results"></div>
    </div>
  </div>

  <div id="context-menu" class="hidden"></div>
  <div id="update-notification" class="hidden"></div>

  <div id="toast-container"></div>

  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="utils/helpers.js"></script>
  <script src="services/ai-provider-service.js"></script>
  <script src="services/file-system-service.js"></script>
  <script src="components/title-bar.js"></script>
  <script src="components/sidebar.js"></script>
  <script src="components/editor-manager.js"></script>
  <script src="components/terminal-panel.js"></script>
  <script src="components/chat-panel.js"></script>
  <script src="components/status-bar.js"></script>
  <script src="components/toast.js"></script>
  <script src="components/settings-page.js"></script>
  <script src="components/update-notification.js"></script>
  <script src="components/command-palette.js"></script>
  <script src="app.js"></script>
</body>
</html>
